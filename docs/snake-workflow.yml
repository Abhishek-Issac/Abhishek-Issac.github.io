name: generate github contribution snake

on:
  # run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # allow manual trigger from the Actions tab
  workflow_dispatch:
  # also rebuild when this workflow itself changes
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # write both light and dark variants into a temporary dist/ folder
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#b48848&color_dots=#e7e4dc,#cdb482,#b48848,#1f3b2d,#14141a
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#b48848&color_dots=#161b22,#3a311a,#7a5c2c,#b48848,#f5e3b8

      - name: Push generated SVGs to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
